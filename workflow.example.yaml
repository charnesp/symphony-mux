# =============================================================================
# Stokowski — Example Multi-Workflow Configuration
# =============================================================================
#
# Copy this file to workflow.yaml and customise for your project.
# Stokowski re-reads this file on every poll tick — changes take effect
# without restart.
#
# Multi-workflow: issues are routed based on their Linear labels.
# First matching workflow wins. One workflow can be marked 'default: true'
# as fallback for issues without matching labels.
#
# Prompt files live in the prompts/ directory. Each agent state references
# its prompt via the `prompt` field. A global prompt (shared preamble) is
# injected before the stage-specific prompt when set.
#
# Linear states mapping:
#   active        → the "working" state for agent stages
#   review        → human review / PR review state
#   gate_approved → human approved a gate (triggers transition)
#   rework        → human requested changes (triggers rework_to)
#   terminal      → list of done/closed states
#
# State types:
#   agent       — Stokowski dispatches Claude Code in this state
#   agent-gate  — machine routing from <<<STOKOWSKI_ROUTE>>> JSON (requires default_transition →
#                 a gate, plus named transitions; see README). post_run omitted ⇒ two turns
#                 (closure in post-run); post_run: false ⇒ single turn (routing in stage prompt)
#   gate        — pauses for human review; approve → next, rework → rework_to
#   terminal    — issue is finished; workspace cleaned up
#
# Example (see workflow "feature"): after an agent code-review, an agent-gate can route
# to a "fix findings" agent state that loops back into code-review, or to a human gate.
# =============================================================================

# -----------------------------------------------------------------------------
# Tracker
# -----------------------------------------------------------------------------
tracker:
  kind: linear
  project_slug: "abc123def456"    # hex slugId from your Linear project URL
                                  # can also be set via LINEAR_PROJECT_SLUG env var


# -----------------------------------------------------------------------------
# Linear state name mapping
# -----------------------------------------------------------------------------
# These map Stokowski's internal lifecycle roles to your Linear state names.
# You can rename values to match your Linear setup (e.g. todo: "Ready"),
# but all six roles are required — removing or reordering them will break
# the dispatch and gate protocol.
linear_states:
  todo: "Todo"                        # issues picked up from this state
  active: "In Progress"               # moved here automatically when agent starts
  review: "Human Review"              # agent pauses here at a gate for human review
  gate_approved: "Gate Approved"      # human approved — agent advances to next state
  rework: "Rework"                    # human requested changes — agent re-enters rework target
  terminal:                           # issues in these states stop any running agent
    - Done
    - Closed
    - Cancelled
    - Canceled
    - Duplicate

# -----------------------------------------------------------------------------
# Polling
# -----------------------------------------------------------------------------
polling:
  interval_ms: 15000              # 15 seconds between ticks

# -----------------------------------------------------------------------------
# Workspace
# -----------------------------------------------------------------------------
workspace:
  root: ~/stokowski-workspaces

# -----------------------------------------------------------------------------
# Hooks — shell scripts run in the workspace directory
# -----------------------------------------------------------------------------
hooks:
  after_create: |
    git clone --depth 1 git@github.com:your-org/your-repo.git .
    npm install
  before_run: |
    git fetch origin main || exit 1
    if [ -z "$(git status --porcelain)" ]; then
      # Pure behind main → fast-forward; diverged → rebase onto main
      if git merge-base --is-ancestor HEAD origin/main; then
        git merge --ff-only origin/main || exit 1
      else
        git rebase origin/main || exit 1
      fi
    fi
  timeout_ms: 120000

# -----------------------------------------------------------------------------
# Claude defaults (inherited by all agent states unless overridden)
# States using runner: codex will use the Codex CLI instead.
# States using runner: mux will use the Mux CLI instead.
# Note: Mux uses the same configuration options as Claude (permission_mode, model,
# max_turns, timeouts, etc.) since it's a Claude Code compatible runner.
# -----------------------------------------------------------------------------
claude:
  permission_mode: auto
  model: claude-sonnet-4-6
  max_turns: 20
  turn_timeout_ms: 3600000        # 1 hour per turn
  stall_timeout_ms: 300000        # 5 minutes with no output → kill

# -----------------------------------------------------------------------------
# Agent concurrency
# -----------------------------------------------------------------------------
agent:
  max_concurrent_agents: 4
  max_retry_backoff_ms: 300000    # 5-minute cap on exponential backoff

# -----------------------------------------------------------------------------
# Server (optional web dashboard)
# -----------------------------------------------------------------------------
server:
  port: 4200

# -----------------------------------------------------------------------------
# Workflows — issues are routed based on Linear labels
# -----------------------------------------------------------------------------
#
# Each workflow defines:
#   - label: the Linear label that triggers this workflow (exact match)
#   - default: (optional) if true, this workflow is the fallback for issues
#             without matching labels. Only one workflow can be default.
#   - states: the state machine for this workflow
#   - prompts: global_prompt, lifecycle_prompt, optional lifecycle_post_run_prompt
#
# First matching workflow wins (YAML order matters).
# If no workflow matches and no default exists, dispatch fails.
#
# Backwards compatibility: if 'workflows:' is absent, Stokowski creates an
# implicit default workflow from root 'states:' and 'prompts:' sections.
# -----------------------------------------------------------------------------

workflows:

  # ── Workflow: debug ───────────────────────────────────────────────────────
  # Triggered by the "debug" label on Linear issues.
  # Lightweight workflow for bug investigation and quick fixes.
  # ──────────────────────────────────────────────────────────────────────────
  debug:
    label: debug

    prompts:
      global_prompt: prompts/debug/global.md
      lifecycle_prompt: prompts/lifecycle.md
      lifecycle_post_run_prompt: prompts/lifecycle-post-run.md

    # Per-workflow concurrency limits (optional, overrides global agent:)
    max_concurrent_agents: 2
    max_concurrent_agents_by_state:
      investigate: 2
      fix: 1

    states:
      # Entry state (first agent state)
      investigate:
        type: agent
        prompt: prompts/debug/investigate.md
        linear_state: active
        model: claude-opus-4-6
        max_turns: 8
        session: inherit
        transitions:
          complete: fix-review

      fix-review:
        type: gate
        linear_state: review
        rework_to: investigate
        max_rework: 2
        transitions:
          approve: fix

      fix:
        type: agent
        prompt: prompts/debug/fix.md
        linear_state: active
        model: claude-sonnet-4-6
        max_turns: 15
        session: inherit
        transitions:
          complete: pr-review

      pr-review:
        type: gate
        linear_state: review
        rework_to: fix
        max_rework: 3
        transitions:
          approve: done

      done:
        type: terminal
        linear_state: terminal

  # ── Workflow: feature ───────────────────────────────────────────────────
  # Triggered by the "feature" label on Linear issues.
  # Full workflow for feature development with multiple review gates.
  # Marked as default — used for issues without matching labels.
  # ──────────────────────────────────────────────────────────────────────────
  feature:
    label: feature
    default: true                 # Fallback for issues without matching labels

    prompts:
      global_prompt: prompts/feature/global.md
      lifecycle_prompt: prompts/lifecycle.md
      lifecycle_post_run_prompt: prompts/lifecycle-post-run.md

    # Per-workflow concurrency limits
    max_concurrent_agents: 4
    max_concurrent_agents_by_state:
      investigate: 2
      implement: 2
      code-review: 1              # Serial reviews prevent merge conflicts
      correct-findings-code-review: 2

    states:
      # Entry state (first agent state)
      investigate:
        type: agent
        prompt: prompts/feature/investigate.md
        linear_state: active
        model: claude-opus-4-6
        max_turns: 8
        session: inherit
        transitions:
          complete: research-review

      research-review:
        type: gate
        linear_state: review
        rework_to: investigate
        max_rework: 3
        transitions:
          approve: implement

      implement:
        type: agent
        prompt: prompts/feature/implement.md
        linear_state: active
        model: claude-sonnet-4-6
        max_turns: 30
        session: inherit
        transitions:
          complete: implementation-review

      implementation-review:
        type: gate
        linear_state: review
        rework_to: implement
        max_rework: 5
        transitions:
          approve: code-review

      code-review:
        type: agent
        prompt: prompts/feature/review.md
        linear_state: active
        runner: claude
        model: claude-opus-4-6
        max_turns: 10
        session: fresh              # Fresh session for adversarial review
        transitions:
          complete: review-findings-route

      # After automated code review: machine routing — findings → fix pass → code-review again;
      # clean → human merge gate. On invalid routing output, default sends to merge-review.
      review-findings-route:
        type: agent-gate
        prompt: prompts/feature/review-findings-route.md
        linear_state: active
        default_transition: needs_human
        transitions:
          has_findings: correct-findings-code-review
          clean: merge-review
          needs_human: merge-review

      correct-findings-code-review:
        type: agent
        prompt: prompts/feature/correct-findings-code-review.md
        linear_state: active
        model: claude-sonnet-4-6
        max_turns: 15
        session: inherit
        transitions:
          complete: code-review

      merge-review:
        type: gate
        linear_state: review
        rework_to: implement
        max_rework: 5
        transitions:
          approve: merge

      merge:
        type: agent
        prompt: prompts/feature/merge.md
        linear_state: active
        max_turns: 5
        session: inherit
        transitions:
          complete: done

      done:
        type: terminal
        linear_state: terminal

  # ── Workflow: docs ──────────────────────────────────────────────────────
  # Triggered by the "docs" label on Linear issues.
  # Simple workflow for documentation updates.
  # ──────────────────────────────────────────────────────────────────────────
  docs:
    label: docs

    prompts:
      global_prompt: prompts/docs/global.md
      lifecycle_prompt: prompts/lifecycle.md
      lifecycle_post_run_prompt: prompts/lifecycle-post-run.md

    max_concurrent_agents: 2

    states:
      write:
        type: agent
        prompt: prompts/docs/write.md
        linear_state: active
        model: claude-sonnet-4-6
        max_turns: 10
        session: inherit
        transitions:
          complete: review

      review:
        type: gate
        linear_state: review
        rework_to: write
        max_rework: 3
        transitions:
          approve: done

      done:
        type: terminal
        linear_state: terminal
